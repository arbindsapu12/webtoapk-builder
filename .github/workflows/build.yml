name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create Dummy APK
        run: |
          mkdir -p output
          echo "Fake APK" > output/app.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: output/app.apk
